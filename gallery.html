<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px 30px;
        }
        
        /* The new frame that holds both the image and the overlay */
        .gallery-photo-frame {
            position: relative;
            display: block;
            border: 1px solid var(--stroke);
            padding: 6px;
            background: #fff;
            box-shadow: 0 2px 12px rgba(44, 62, 80, 0.04);
            transition: transform var(--transition-speed) var(--transition-ease), border-color var(--transition-speed);
            cursor: pointer;
        }
        
        .gallery-photo-frame:hover {
            transform: translateY(-2px);
            border-color: var(--hover-accent);
        }
        
        .gallery-photo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* The new soft blue overlay */
        .gallery-overlay {
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px; /* Fits perfectly inside the white photo border */
            background-color: var(--bg-home); 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            opacity: 1;
            transition: opacity 0.5s var(--transition-ease);
            z-index: 2;
        }
        
        /* Fade out the overlay on hover */
        .gallery-photo-frame:hover .gallery-overlay {
            opacity: 0;
        }
        
        .overlay-text {
            color: var(--text-primary);
            font-size: 1.3rem;
            font-style: italic; /* Keeps the handwritten feel for the overlay only */
        }
        
        .gallery-caption {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 12px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 900px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .gallery-grid { grid-template-columns: 1fr; } }
        @media (prefers-reduced-motion: reduce) { .gallery-photo-frame:hover { transform: none; } }
    </style>
</head>
<body id="page-gallery" class="subpage">
    <a href="index.html" class="nav-back">← Back to Home</a>
    
    <div class="page-container">
        <h1 id="gallery-title" class="page-title" style="margin-bottom: 12px;"></h1>
        <p id="gallery-subtitle" style="text-align: center; margin-bottom: 60px; color: var(--text-secondary); font-size: 1.1rem;"></p>
        
        <div id="gallery-grid" class="gallery-grid">
            </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
