
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 40px;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid var(--stroke);
            padding: 8px;
            background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: transform var(--transition-speed) var(--transition-ease), border-color var(--transition-speed);
        }
        .gallery-item img:hover {
            transform: translateY(-2px);
            border-color: var(--text-secondary);
        }
        .gallery-caption {
            text-align: center;
            font-style: italic;
            color: var(--text-secondary);
            margin-top: 16px;
            font-size: 0.95rem;
        }
        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
        @media (prefers-reduced-motion: reduce) {
            .gallery-item img:hover { transform: none; }
        }
    </style>
</head>
<body id="page-gallery" class="subpage">
    <a href="index.html" class="nav-back">← Back to Home</a>
    
    <div class="page-container">
        <h1 id="gallery-title" class="page-title"></h1>
        <div id="gallery-grid" class="gallery-grid">
            </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
