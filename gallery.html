<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px 30px;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid var(--stroke);
            padding: 6px;
            background: #fff;
            box-shadow: 0 2px 12px rgba(44, 62, 80, 0.04); /* Updated to a soft blue-gray shadow */
            transition: transform var(--transition-speed) var(--transition-ease), border-color var(--transition-speed);
        }
        .gallery-item img:hover {
            transform: translateY(-2px);
            border-color: var(--hover-accent);
        }
        .gallery-caption {
            text-align: center;
            /* Italics removed from here */
            color: var(--text-secondary);
            margin-top: 12px;
            font-size: 0.9rem;
        }
        
        @media (max-width: 900px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
        @media (prefers-reduced-motion: reduce) {
            .gallery-item img:hover { transform: none; }
        }
    </style>
</head>
<body id="page-gallery" class="subpage">
    <a href="index.html" class="nav-back">← Back to Home</a>
    
    <div class="page-container">
        <h1 id="gallery-title" class="page-title" style="margin-bottom: 12px;"></h1>
        
        <p id="gallery-subtitle" style="text-align: center; margin-bottom: 60px; color: var(--text-secondary); font-size: 1.1rem;"></p>
        
        <div id="gallery-grid" class="gallery-grid">
            </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
