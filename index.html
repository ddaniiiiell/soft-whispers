<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soft Purple Archive</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body id="page-home">
    <div
      class="page-container"
      style="
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      "
    >
      <h1
        id="home-title"
        style="
          font-size: clamp(34px, 5vw, 64px);
          font-weight: normal;
          margin-bottom: 24px;
        "
      ></h1>

      <div
        id="home-subtitle"
        style="
          margin-bottom: 48px;
          color: var(--text-secondary);
          font-size: 1.1rem;
          line-height: 1.8;
        "
      ></div>

      <h2
        id="cta-title"
        style="
          font-size: 1.1rem;
          font-weight: normal;
          color: var(--text-secondary);
          margin-top: 40px;
          margin-bottom: 20px;
        "
      ></h2>

      <div
        style="
          display: flex;
          gap: 40px;
          justify-content: center;
          flex-wrap: wrap;
        "
      >
        <a href="birthday.html" class="btn" id="btn-birthday"></a>
        <a href="gallery.html" class="btn" id="btn-gallery"></a>
        <a href="poems.html" class="btn" id="btn-poems"></a>
        
        <!-- ADD BACK ANNI BUTTON HERE-->  
        <!--  -->
        <a href="anniversary.html" class="btn" id="btn-anniversary"></a>

  <div class="music-player">
    <iframe
      src="https://open.spotify.com/embed/track/67zEXvRtamg3PfQ1dKp2QH?si=17f1cd329dd24e2c"
      width="90%"
      height="80"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"
    ></iframe>
  </div>
    </div>

    <script src="js/app.js"></script>
    <button
      id="theme-toggle"
      class="theme-toggle-btn"
      aria-label="Toggle Theme"
    >
      ✧
    </button>
  </body>
</html>
